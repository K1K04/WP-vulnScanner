# ─────────────────────────────────────────────────────────────────────────────
# WP VulnScanner Pro — docker-compose v2 (hardened)
# ─────────────────────────────────────────────────────────────────────────────

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      # BuildKit habilitado para cache mounts del Dockerfile v2
      args:
        PYTHON_VERSION: "3.13"
        DEBIAN_CODENAME: "trixie"
    image: ${IMAGE_REPO:-kiko4/wpvulnscan}:${IMAGE_TAG:-3.0}
    container_name: wpvulnscan_app
    restart: unless-stopped

    env_file: .env
    environment:
      - HOST=0.0.0.0
      - PORT=5000
      - DB_PATH=/data/scans.db
      - VULNS_DB_PATH=/data/vulns.db

    volumes:
      - wpvulnscan_data:/data
      - wpvulnscan_cache:/tmp/wpvulnscan_cache
      # /dev/shm para gunicorn --worker-tmp-dir (evita I/O de disco)
      - type: tmpfs
        target: /dev/shm
        tmpfs:
          size: 64m

    expose:
      - "5000"

    networks:
      - internal
      - external

    # ── Hardening del runtime ────────────────────────────────────────────────
    # Previene escalada de privilegios en el contenedor
    security_opt:
      - no-new-privileges:true
    # Filesystem raíz de solo lectura — solo /data, /tmp y /dev/shm son escribibles
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    # Capabilities mínimas necesarias — drop ALL, add solo las imprescindibles
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE   # solo si necesitas puerto < 1024 (aquí no, usamos 5000)
    # Límites de recursos (protección DoS básica)
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "2.0"
        reservations:
          memory: 256m

    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:5000/health',timeout=6); sys.exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  nginx:
    image: nginx:1.27-alpine
    container_name: wpvulnscan_nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

    networks:
      - internal
      - external

    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=64m
      - /var/run:size=8m
      - /tmp:size=32m

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"


volumes:
  wpvulnscan_data:
    driver: local
  wpvulnscan_cache:
    driver: local

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge
