# ─────────────────────────────────────────────────────────────────────────────
# WP VulnScanner Pro — Nginx reverse proxy config
# ─────────────────────────────────────────────────────────────────────────────

# ── Compresión GZIP ──────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_comp_level 5;
gzip_types text/plain text/css text/javascript application/json 
           application/javascript text/xml application/xml 
           application/xml+rss application/rss+xml 
           application/vnd.ms-fontobject application/x-font-ttf 
           application/x-font-opentype application/x-font-truetype 
           font/eot font/opentype image/svg+xml;
gzip_disable "msie6";

# ── Cache headers por tipo de contenido ──────────────────────────────────────
map $sent_http_content_type $expires_static {
    default                       off;
    text/html                     "epoch";
    text/css                      "max";
    application/javascript        "max";
    application/x-javascript     "max";
    ~image/                       "max";
    ~font/                        "max";
    application/font-woff         "max";
    application/font-woff2        "max";
    application/vnd.ms-fontobject "max";
}

# Rate limiting global (complementa el rate-limit de Flask)
limit_req_zone $binary_remote_addr zone=scan_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=5r/m;

server {
    listen 80;
    server_name _;

    # Redirigir HTTP → HTTPS en producción
    # Descomentar cuando tengas certificado TLS:
    # return 301 https://$host$request_uri;

    # ── Cabeceras de seguridad ───────────────────────────────────────────────
    add_header X-Frame-Options          "DENY"            always;
    add_header X-Content-Type-Options   "nosniff"         always;
    add_header Referrer-Policy          "no-referrer"     always;
    add_header X-XSS-Protection         "0"               always;
    add_header Permissions-Policy       "geolocation=()"  always;

    # Ocultar versión de Nginx
    server_tokens off;

    # ── Tamaño máximo de request ─────────────────────────────────────────────
    client_max_body_size 10M;

    # ── Timeouts (los escaneos pueden tardar hasta 5 min) ────────────────────
    proxy_read_timeout  360s;
    proxy_send_timeout  360s;
    proxy_connect_timeout 10s;

    # ── Endpoint de inicio de escaneo — rate-limited ─────────────────────────
    location /scan {
        limit_req zone=scan_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://app:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE: Server-Sent Events para streaming de resultados
        proxy_buffering    off;
        proxy_cache        off;
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
    }

    # ── API endpoints — rate-limited ─────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass       http://app:5000;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Resto de rutas ────────────────────────────────────────────────────────
    location / {
        proxy_pass       http://app:5000;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health check (sin rate limit) ─────────────────────────────────────────
    location /health {
        proxy_pass http://app:5000/health;
        access_log off;
    }

    # ── Assets estáticos con cache largo ──────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|manifest|json)$ {
        proxy_pass http://app:5000;
        expires 365d;
        add_header Cache-Control "public, immutable" always;
        add_header ETag "\"static-v1\"" always;
    }

    # ── Bloquear acceso a ficheros sensibles ──────────────────────────────────
    location ~ /\.(env|git|gitignore|dockerignore) {
        deny all;
        return 404;
    }
}

